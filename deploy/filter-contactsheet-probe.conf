# /etc/fail2ban/filter.d/contactsheet-probe.conf
#
# Bans scanners hammering the admin path.
#
# Caddy on this host already resolves the true visitor address into the
# "client_ip" field (verified: remote_ip is 127.0.0.1 from the tunnel, while
# client_ip holds the real address). Matching that field is more robust than
# picking Cf-Connecting-Ip out of the headers object, because the headers
# object has no guaranteed key order.
#
# Verify against your real log before trusting it:
#   fail2ban-regex /var/log/caddy/access.log \
#     /etc/fail2ban/filter.d/contactsheet-probe.conf --print-all-matched

[Definition]

failregex = ^.*"client_ip":"<HOST>".*"uri":"/images[^"]*".*"status":(401|403|404)
            ^.*"uri":"/images[^"]*".*"status":(401|403|404).*"client_ip":"<HOST>"

ignoreregex =

datepattern = "ts":"%%Y-%%m-%%dT%%H:%%M:%%S

[Init]
maxlines = 1
