# /etc/fail2ban/filter.d/contactsheet.conf
#
# Reads the application's own auth log, which records the real client IP
# taken from X-Forwarded-For (Caddy sets it; the app trusts exactly one hop).

[Definition]

failregex = ^\S+ LOGIN_FAILED ip=<HOST>\s
            ^\S+ LOGIN_THROTTLED ip=<HOST>\s
            ^\S+ ADMIN_FORBIDDEN ip=<HOST>\s

ignoreregex = ^\S+ LOGIN_OK ip=<HOST>\s

# Log lines start with an ISO 8601 UTC timestamp, e.g.
# 2026-07-18T09:34:03.399Z LOGIN_FAILED ip=1.2.3.4 user="alex" reason="bad_password"
datepattern = ^%%Y-%%m-%%dT%%H:%%M:%%S

[Init]
maxlines = 1
